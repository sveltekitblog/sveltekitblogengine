<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <!-- 톱니바퀴용 다크 메탈릭 그라디언트 -->
    <linearGradient id="cogGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="50%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <!-- Svelte 로고용 화려한 오렌지 그라디언트 -->
    <linearGradient id="svelteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3e00" />
      <stop offset="100%" stop-color="#ff7a00" />
    </linearGradient>
    <!-- 내부 입체감을 위한 미세한 그림자 효과 -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- 1. 톱니바퀴 (Engine Cog Wheel) -->
  <g filter="url(#dropShadow)">
    <rect x="54" y="10" width="20" height="108" rx="6" fill="url(#cogGrad)" />
    <rect x="54" y="10" width="20" height="108" rx="6" fill="url(#cogGrad)" transform="rotate(45 64 64)" />
    <rect x="54" y="10" width="20" height="108" rx="6" fill="url(#cogGrad)" transform="rotate(90 64 64)" />
    <rect x="54" y="10" width="20" height="108" rx="6" fill="url(#cogGrad)" transform="rotate(135 64 64)" />
    <circle cx="64" cy="64" r="46" fill="url(#cogGrad)" />
  </g>

  <!-- 2. 중앙 컷아웃 홀 및 테두리 링 -->
  <circle cx="64" cy="64" r="32" fill="#0f172a" />
  <circle cx="64" cy="64" r="32" fill="none" stroke="url(#svelteGrad)" stroke-width="2" opacity="0.7" />

  <!-- 3. Svelte 로고 엠블럼 (중앙 배치 및 축소 정렬) -->
  <g transform="translate(45.3, 41.6) scale(0.35)">
    <!-- Svelte 로고 아웃라인 -->
    <path d="M94.157 22.819c-10.4-14.885-30.94-19.297-45.792-9.835L22.282 29.608A29.92 29.92 0 0 0 8.764 49.65a31.5 31.5 0 0 0 3.108 20.231 30 30 0 0 0-4.477 11.183 31.9 31.9 0 0 0 5.448 24.116c10.402 14.887 30.942 19.297 45.791 9.835l26.083-16.624A29.92 29.92 0 0 0 98.235 78.35a31.53 31.53 0 0 0-3.105-20.232 30 30 0 0 0 4.474-11.182 31.88 31.88 0 0 0-5.447-24.116" fill="url(#svelteGrad)" />
    <!-- Svelte 로고 인라인 화이트 라인 -->
    <path d="M45.817 106.582a20.72 20.72 0 0 1-22.237-8.243 19.17 19.17 0 0 1-3.277-14.503 18 18 0 0 1 .624-2.435l.49-1.498 1.337.981a33.6 33.6 0 0 0 10.203 5.098l.97.294-.09.968a5.85 5.85 0 0 0 1.052 3.878 6.24 6.24 0 0 0 6.695 2.485 5.8 5.8 0 0 0 1.603-.704L69.27 76.28a5.43 5.43 0 0 0 2.45-3.631 5.8 5.8 0 0 0-.987-4.371 6.24 6.24 0 0 0-6.698-2.487 5.7 5.7 0 0 0-1.6.704l-9.953 6.345a19 19 0 0 1-5.296 2.326 20.72 20.72 0 0 1-22.237-8.243 19.17 19.17 0 0 1-3.277-14.502 17.99 17.99 0 0 1 8.13-12.052l26.081-16.623a19 19 0 0 1 5.3-2.329 20.72 20.72 0 0 1 22.237 8.243 19.17 19.17 0 0 1 3.277 14.503 18 18 0 0 1-.624 2.435l-.49 1.498-1.337-.98a33.6 33.6 0 0 0-10.203-5.1l-.97-.294.09-.968a5.86 5.86 0 0 0-1.052-3.878 6.24 6.24 0 0 0-6.696-2.485 5.8 5.8 0 0 0-1.602.704L37.73 51.72a5.42 5.42 0 0 0-2.449 3.63 5.79 5.79 0 0 0 .986 4.372 6.24 6.24 0 0 0 6.698 2.486 5.8 5.8 0 0 0 1.602-.704l9.952-6.342a19 19 0 0 1 5.295-2.328 20.72 20.72 0 0 1 22.237 8.242 19.17 19.17 0 0 1 3.277 14.503 18 18 0 0 1-8.13 12.053l-26.081 16.622a19 19 0 0 1-5.3 2.328" fill="#ffffff" />
  </g>
</svg>